<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AeroFlow - Single Pipe Simulator</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <div class="logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      <h1>AeroFlow <span>Fluid Simulator</span></h1>
    </div>
  </header>

  <main class="app-grid">
    <!-- Left Panel: Form Inputs -->
    <aside class="panel left-panel">
      <div class="panel-section">
        <h2>Pipe Geometry</h2>
        <div class="input-group">
          <label>Pipe Length (m)</label>
          <input type="number" id="inp-length" value="10" step="1">
        </div>
        <div class="input-group">
          <label>Start Diameter (m)</label>
          <input type="number" id="inp-dstart" value="0.1" step="0.01">
        </div>
        <div class="input-group">
          <label>End Diameter (m)</label>
          <input type="number" id="inp-dend" value="0.05" step="0.01">
        </div>
      </div>

      <div class="panel-section">
        <h2>Flow State</h2>
        <div class="input-group">
          <label>Volumetric Flow Rate (m³/s)</label>
          <input type="number" id="inp-flowrate" value="0.01" step="0.001">
        </div>
        <div class="input-group">
          <label>Fluid Density (kg/m³)</label>
          <input type="number" id="inp-rho" value="998" step="1">
        </div>
        <div class="input-group">
          <label>Fluid Viscosity (Pa·s)</label>
          <input type="number" id="inp-mu" value="0.001001" step="0.0001">
        </div>
      </div>
    </aside>

    <!-- Center Panel: Results & Canvas -->
    <section class="center-panel">
      <div class="results-header">
        <div class="result-card">
          <span class="res-label">Inlet Velocity</span>
          <span class="res-val" id="res-vin">0.00 m/s</span>
        </div>
        <div class="result-card">
          <span class="res-label">Outlet Velocity</span>
          <span class="res-val" id="res-vout">0.00 m/s</span>
        </div>
        <div class="result-card">
          <span class="res-label">Reynolds Number (Max)</span>
          <span class="res-val" id="res-re">0</span>
        </div>
        <div class="result-card">
          <span class="res-label">Total Pressure Drop</span>
          <span class="res-val highlight" id="res-drop">0.00 Pa</span>
        </div>
      </div>
      
      <div class="canvas-toolbar">
         <div class="tool-group">
            <span class="tool-label">View Mode:</span>
            <button id="btn-heatmap-v" class="btn-tool active">Velocity Profile</button>
            <button id="btn-heatmap-p" class="btn-tool">Pressure Profile</button>
         </div>
      </div>
      
      <div class="canvas-container" id="canvas-container">
        <canvas id="flow-canvas"></canvas>
      </div>
    </section>
  </main>

  <script src="js/physics.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
